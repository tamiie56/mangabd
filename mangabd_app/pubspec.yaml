name: mangabd_app
description: "MangaBD - A manga reading app."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  provider: ^6.1.5+1
  image_picker: ^1.2.2
  http: ^1.6.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo/mangabd_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#00FF6A"
  adaptive_icon_foreground: "assets/logo/mangabd_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
